  num_features: 4
  k: 10
  hadronic_detector: zdc_Fe
  include_ecal: False
  num_z_layers: 16
model:
  block_type: graphnet
  concat_input: True
  edge_block_opt:
    use_edges: true
    use_globals: true
    use_receiver_nodes: true
    use_sender_nodes: true
  global_block_opt:
    use_edges: false
    use_globals: true
    use_nodes: true
  node_block_opt:
    use_globals: true
    use_nodes: true
    use_received_edges: true
    use_sent_edges: false # going out of the node , check get edges.
  num_blocks: 1
  num_layers: 4
  latent_size: 64
  reducer: mean
  
training:
  epochs: 70
  learning_rate: 1.e-3
